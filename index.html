<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LD Debate Timer</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;700&family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f1a;
  --fg:#e8f0ff;
  --accent:#7cf7ff;
  --ring:#2a3350;
  --card:rgba(255,255,255,0.06);
  --glow:none;
}

*{
  box-sizing:border-box;
  font-family:"JetBrains Mono", monospace;
}

body{
  margin:0;
  height:100vh;
  overflow:hidden;
  background:var(--bg);
  color:var(--fg);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .25s ease;
}

/* ================= THEMES ================= */

body.dark{--glow:0 0 12px var(--accent);}
body.light{--bg:#f5f7ff;--fg:#111;--accent:#ff4d4d;--ring:#cfd6ff;}
body.min-dark{--bg:#111;--fg:#ddd;--accent:#aaa;--ring:#333;}
body.min-light{--bg:#fafafa;--fg:#000;--accent:#000;--ring:#00000033;}
body.aesthetic{--bg:linear-gradient(135deg,#1a002b,#002b36);--accent:#ff7bf7;--fg:#fff;font-family:"Rajdhani";}
body.hacker{--bg:#000;--fg:#00ff66;--accent:#00ff66;font-family:"Share Tech Mono";}
body.scifi{--bg:#050816;--accent:#4df;--fg:#d6f3ff;font-family:"Orbitron";}
body.synthwave{--bg:#0a0014;--accent:#ff3df2;--fg:#ffd6ff;font-family:"Orbitron";}

/* ================= SETTINGS ================= */

.settings-btn{
  position:absolute;
  top:12px;
  right:12px;
  z-index:99999;
  background:var(--card);
  padding:10px;
  border-radius:12px;
  cursor:pointer;
}

.panel{
  position:absolute;
  top:0;
  right:-320px;
  width:300px;
  height:100%;
  background:var(--card);
  backdrop-filter:blur(10px);
  padding:20px;
  transition:.3s;
  z-index:99990;
}

.panel.open{right:0;}

.overlay{
  position:fixed;
  inset:0;
  display:none;
  z-index:99980;
}
.overlay.show{display:block;}

/* ================= LAYOUT ================= */

.wrapper{
  display:flex;
  gap:40px;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
  padding:20px;
}

/* ================= PORTRAIT MODE (FIXED + COMPACT) ================= */

body.portrait .wrapper{
  flex-direction:column;
  gap:6px;
  padding:8px;
}

body.portrait .ring{
  width:min(58vw, 220px);
  height:min(58vw, 220px);
}

body.portrait .prep-ring{
  width:min(38vw, 150px);
  height:min(38vw, 150px);
}

/* ================= RINGS ================= */

.ring,.prep-ring{
  position:relative;
  cursor:pointer;
}

.ring{width:280px;height:280px;}
.prep-ring{width:200px;height:200px;}

svg{transform:rotate(-90deg);}
circle{fill:none;stroke-width:10;stroke-linecap:round;}

.bg-ring{stroke:var(--ring);}
.progress,.prep-progress{stroke:var(--accent);filter:drop-shadow(var(--glow));}

/* ================= TEXT ================= */

.time,.prep-time{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  width:100%;
}

.time{font-size:2.4rem;}
.prep-time{font-size:1.2rem;}

.label{
  position:absolute;
  top:28%;
  left:50%;
  transform:translateX(-50%);
  font-size:.9rem;
  opacity:.85;
}

/* ================= CONTROLS ================= */

.main-controls{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:10px;
}

.ctrl-btn{
  padding:10px 12px;
  border-radius:10px;
  border:1px solid var(--accent);
  background:rgba(255,255,255,0.06);
  color:var(--fg);
  cursor:pointer;
}

/* ================= SWIPE AREA ================= */

.swipe-area{
  position:absolute;
  inset:0;
  z-index:1;
}
</style>
</head>

<body class="dark portrait">

<div class="settings-btn" onclick="togglePanel()">⚙</div>
<div class="overlay" id="overlay" onclick="closePanel()"></div>

<div class="panel" id="panel">
  <button onclick="closePanel()">✕</button>

  <p>Mode</p>
  <button class="ctrl-btn" onclick="toggleMode()">Timer / Stopwatch</button>

  <p>Themes</p>
  <button class="ctrl-btn" onclick="setTheme('dark')">Dark</button>
  <button class="ctrl-btn" onclick="setTheme('light')">Light</button>
  <button class="ctrl-btn" onclick="setTheme('min-dark')">Min Dark</button>
  <button class="ctrl-btn" onclick="setTheme('min-light')">Min Light</button>
  <button class="ctrl-btn" onclick="setTheme('aesthetic')">Aesthetic</button>
  <button class="ctrl-btn" onclick="setTheme('hacker')">Hacker</button>
  <button class="ctrl-btn" onclick="setTheme('scifi')">Sci-Fi</button>
  <button class="ctrl-btn" onclick="setTheme('synthwave')">Synthwave</button>
</div>

<div class="wrapper">

  <div class="prep-ring" id="prepRing">
    <div class="label">PREP</div>
    <svg viewBox="0 0 200 200">
      <circle class="bg-ring" cx="100" cy="100" r="70"></circle>
      <circle class="prep-progress" cx="100" cy="100" r="70"></circle>
    </svg>
    <div class="prep-time" id="prepTime">04:00.00</div>
  </div>

  <div class="ring" id="mainRing">
    <div class="label" id="speech">Ready</div>
    <svg viewBox="0 0 280 280">
      <circle class="bg-ring" cx="140" cy="140" r="110"></circle>
      <circle class="progress" cx="140" cy="140" r="110"></circle>
    </svg>
    <div class="time" id="time">00:00.00</div>
  </div>

</div>

<script>
/* ================= STATE ================= */

let i=0,running=false,start=0,elapsed=0,mode="timer";
let prepRunning=false,prepStart=0,prepElapsed=0;
let prepDuration=240000;

/* ================= SPEECHES ================= */

const speeches=[
 {name:"AC (6)",duration:360},
 {name:"CX (3)",duration:180},
 {name:"NC (7)",duration:420},
 {name:"CX (3)",duration:180},
 {name:"1AR (4)",duration:240},
 {name:"NR (6)",duration:360},
 {name:"2AR (3)",duration:180}
];

/* ================= DOM ================= */

const mainCircle=document.querySelector(".progress");
const prepCircle=document.querySelector(".prep-progress");

const mainLen=2*Math.PI*110;
const prepLen=2*Math.PI*70;

mainCircle.style.strokeDasharray=mainLen;
prepCircle.style.strokeDasharray=prepLen;

/* ================= FORMAT ================= */

function format(ms){
 let m=Math.floor(ms/60000);
 let s=Math.floor((ms%60000)/1000);
 let cs=Math.floor((ms%1000)/10);
 return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}.${String(cs).padStart(2,"0")}`;
}

/* ================= TIMER ================= */

function tick(t){
 if(running){
  if(!start) start=t-elapsed;
  elapsed=t-start;
 }

 let dur=speeches[i].duration*1000;
 let remaining=Math.max(0,dur-elapsed);
 if(remaining===0) running=false;

 let display=mode==="timer"?remaining:elapsed;

 mainCircle.style.strokeDashoffset=mainLen-(Math.min(elapsed/dur,1))*mainLen;
 document.getElementById("time").textContent=format(display);
 document.getElementById("speech").textContent=speeches[i].name;

 if(prepRunning){
  if(!prepStart) prepStart=t-prepElapsed;
  prepElapsed=t-prepStart;

  if(prepElapsed>=prepDuration){
    prepElapsed=prepDuration;
    prepRunning=false;
  }

  prepCircle.style.strokeDashoffset=
    prepLen-(prepElapsed/prepDuration)*prepLen;

  document.getElementById("prepTime").textContent=
    format(prepDuration-prepElapsed);
 }

 requestAnimationFrame(tick);
}

/* ================= TAP ================= */

function toggleMain(){
 running=!running;
 if(running) start=performance.now()-elapsed;
}

function togglePrep(){
 prepRunning=!prepRunning;
 if(prepRunning) prepStart=performance.now()-prepElapsed;
}

/* ================= DOUBLE TAP RESET ================= */

function doubleTap(el,cb){
 let last=0;
 el.addEventListener("click",()=>{
  const now=Date.now();
  if(now-last<300) cb();
  last=now;
 });
}

doubleTap(document.getElementById("mainRing"),()=>{
 elapsed=0;start=0;running=false;
});

doubleTap(document.getElementById("prepRing"),()=>{
 prepElapsed=0;prepStart=0;prepRunning=false;
});

/* ================= SWIPE ================= */

let touchStartX=0;

function nextSpeech(){i=Math.min(speeches.length-1,i+1);resetMain();}
function prevSpeech(){i=Math.max(0,i-1);resetMain();}

function resetMain(){elapsed=0;start=0;running=false;}

document.addEventListener("touchstart",e=>{
 touchStartX=e.touches[0].clientX;
});

document.addEventListener("touchend",e=>{
 let dx=e.changedTouches[0].clientX-touchStartX;
 if(Math.abs(dx)>50){
  dx<0?nextSpeech():prevSpeech();
 }
});

/* mouse swipe for PC */
let mouseDown=false,startX=0;

document.addEventListener("mousedown",e=>{
 mouseDown=true;startX=e.clientX;
});
document.addEventListener("mouseup",e=>{
 if(!mouseDown) return;
 mouseDown=false;
 let dx=e.clientX-startX;
 if(Math.abs(dx)>50){
  dx<0?nextSpeech():prevSpeech();
 }
});

/* ================= MODE ================= */

function toggleMode(){
 mode=mode==="timer"?"stopwatch":"timer";
}

/* ================= THEMES ================= */

function setTheme(t){
 document.body.className="";
 document.body.classList.add(t);
 document.body.classList.add("portrait");
}

/* ================= SETTINGS ================= */

function togglePanel(){
 panel.classList.toggle("open");
 overlay.classList.toggle("show");
}
function closePanel(){
 panel.classList.remove("open");
 overlay.classList.remove("show");
}

/* ================= INIT ================= */

requestAnimationFrame(tick);

/* click to start */
document.getElementById("mainRing").addEventListener("click",toggleMain);
document.getElementById("prepRing").addEventListener("click",togglePrep);

</script>

</body>
</html>

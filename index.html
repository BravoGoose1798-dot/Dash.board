<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Debate Timer</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;700&display=swap" rel="stylesheet">

<style>
  @keyframes timerStartGlow {
  0% {
    filter: drop-shadow(0 0 0px var(--accent));
    transform: scale(1);
  }
  25% {
    filter: drop-shadow(0 0 25px var(--accent));
    transform: scale(1.02);
  }
  60% {
    filter: drop-shadow(0 0 12px var(--accent));
  }
  100% {
    filter: drop-shadow(0 0 0px var(--accent));
    transform: scale(1);
  }
}

.glow-start {
  animation: timerStartGlow 0.6s ease-out;
}
:root{
  --bg:#0b0f1a;
  --fg:#e8f0ff;
  --accent:#7cf7ff;
  --ring:#2a3350;
  --card:rgba(255,255,255,0.06);
}

*{box-sizing:border-box;font-family:"JetBrains Mono", monospace;}

body{
  margin:0;
  height:100vh;
  overflow:hidden;
  background:var(--bg);
  color:var(--fg);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ===== THEMES (ALL RESTORED) ===== */
body.dark{--accent:#7cf7ff;}
body.light{--bg:#f5f7ff;--fg:#111;--accent:#ff4d4d;--ring:#cfd6ff;}
body.min-dark{--bg:#111;--fg:#ddd;--accent:#aaa;--ring:#333;}
body.min-light{--bg:#fafafa;--fg:#000;--accent:#000;--ring:#00000033;}
body.aether{--bg:#0b1b2b;--fg:#fff;--accent:#ff7bf7;}
body.aesthetic{--bg:#ffe3f1;--fg:#4a1f2d;--accent:#ff4fbf;}
body.hacker{--bg:#000;--fg:#00ff66;--accent:#00ff66;}
body.scifi{--bg:#050816;--fg:#d6f3ff;--accent:#4df;}
body.synthwave{--bg:#0a0014;--fg:#ffd6ff;--accent:#ff3df2;}
body.pride{
  --bg:#000;
  --fg:#fff;
  --accent:#fff;

  /* horizontal rainbow flag (no smooth gradients — hard stripes) */
  background:
    linear-gradient(#e40303 0 16.66%,
    #ff8c00 16.66% 33.33%,
    #ffed00 33.33% 50%,
    #008026 50% 66.66%,
    #004dff 66.66% 83.33%,
    #750787 83.33% 100%);
}



/* ===== LAYOUT ===== */
.wrapper{
  display:flex;
  gap:20px;
  align-items:center;
  justify-content:center;
}

body.portrait .wrapper{flex-direction:column;}
body.landscape .wrapper{flex-direction:row;}

/* ===== RINGS ===== */
.ring,.prep-ring{
  position:relative;
  cursor:pointer;
}

.ring{width:260px;height:260px;}
.prep-ring{width:180px;height:180px;}

svg{transform:rotate(-90deg);}
circle{fill:none;stroke-width:10;stroke-linecap:round;}

.bg-ring{stroke:var(--ring);}
.progress,.prep-progress{stroke:var(--accent);}

.time,.prep-time{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.time{font-size:2.3rem;}
.prep-time{font-size:1.1rem;}

.label{
  position:absolute;
  top:30%;
  left:50%;
  transform:translateX(-50%);
  font-size:.85rem;
}

/* ===== SETTINGS FIXED ON TOP ===== */
.settings-btn{
  position:absolute;
  top:15px;
  right:15px;
  z-index:99999;
  background:var(--card);
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.panel{
  position:fixed;
  top:0;
  right:0;
  width:280px;
  height:100%;
  background:var(--card);
  backdrop-filter:blur(12px);
  transform:translateX(100%);
  transition:.25s;
  z-index:99998;
  padding:15px;
}

.panel.open{transform:translateX(0);}

.overlay{
  position:fixed;
  inset:0;
  display:none;
  z-index:99997;
}
.overlay.show{display:block;}

/* ===== SWITCHES ===== */
.switch{
  position:relative;
  display:inline-block;
  width:52px;
  height:28px;
}

.switch input{display:none;}

.slider{
  position:absolute;
  inset:0;
  background:rgba(255,255,255,0.15);
  border-radius:999px;
  transition:.25s;
}

.slider:before{
  content:"";
  position:absolute;
  width:22px;
  height:22px;
  top:3px;
  left:3px;
  border-radius:50%;
  background:var(--accent);
  transition:.25s;
  box-shadow:0 0 10px var(--accent);
}

.switch input:checked + .slider:before{
  transform:translateX(24px);
}

/* buttons */
.btn{
  margin:4px;
  padding:7px;
  border:1px solid var(--accent);
  background:transparent;
  color:var(--fg);
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
}
</style>
</head>

<body class="dark portrait">

<div class="settings-btn" id="settingsBtn">⚙</div>
<div class="overlay" id="overlay"></div>

<div class="panel" id="panel">
<button class="btn" id="close">Close</button>

<p>Layout (📱 / 💻) </p>
<label class="switch">
<input type="checkbox" id="layoutSwitch">
<span class="slider"></span>
</label>

<p>Format (LD / WSD)</p>
<label class="switch">
<input type="checkbox" id="formatSwitch">
<span class="slider"></span>
</label>
  
 <p>Glow Animation (Off / On)</p>
<label class="switch">
<input type="checkbox" id="glowSwitch" checked>
<span class="slider"></span>
</label>

<!-- ✅ NEW SWITCH -->
<p>Timer / Stopwatch</p>
<label class="switch">
<input type="checkbox" id="modeSwitch">
<span class="slider"></span>
</label>

<p>Themes</p>
<button class="btn" data-theme="dark">Dark</button>
<button class="btn" data-theme="light">Light</button>
<button class="btn" data-theme="min-dark">Min Dark</button>
<button class="btn" data-theme="min-light">Min Light</button>
<button class="btn" data-theme="aether">Aether</button>
<button class="btn" data-theme="aesthetic">Aesthetic</button>
<button class="btn" data-theme="hacker">Hacker</button>
<button class="btn" data-theme="synthwave">Neon</button>
<button class="btn" data-theme="pride">Pride</button>
</div>

<div class="wrapper">

<div class="prep-ring" id="prepRing">
  <div class="label">PREP</div>
  <svg viewBox="0 0 200 200">
    <circle class="bg-ring" cx="100" cy="100" r="70"></circle>
    <circle class="prep-progress" cx="100" cy="100" r="70"></circle>
  </svg>
  <div class="prep-time" id="prepTime">04:00.00</div>
</div>

<div class="ring" id="mainRing">
  <div class="label" id="speech">Ready</div>
  <svg viewBox="0 0 280 280">
    <circle class="bg-ring" cx="140" cy="140" r="110"></circle>
    <circle class="progress" cx="140" cy="140" r="110"></circle>
  </svg>
  <div class="time" id="time">00:00.00</div>
</div>

</div>

<script>

/* ===== STATE ===== */
let i=0,running=false,start=0,elapsed=0;
let wsMode=false;
let mode="timer"; // ✅ NEW: timer vs stopwatch
let glowEnabled = true;
let prepRunning=false,prepStart=0,prepElapsed=0;
let prepDuration=240000;

/* speeches */
const speeches=[
{n:"AC",d:360},{n:"CX",d:180},{n:"NC",d:420},{n:"CX",d:180},
{n:"1AR",d:240},{n:"NR",d:360},{n:"2AR",d:180}
];

const wsSpeech=[
{n:"Prop 1",d:480},{n:"Opp 1",d:480},{n:"Prop 2",d:480},{n:"Opp 2",d:480},
{n:"Prop 3",d:480},{n:"Opp 3",d:480},{n:"Opp Rep",d:240},{n:"Prop Rep",d:240}
];

const main=document.querySelector(".progress");
const prep=document.querySelector(".prep-progress");

const mainLen=2*Math.PI*110;
const prepLen=2*Math.PI*70;

main.style.strokeDasharray=mainLen;
prep.style.strokeDasharray=prepLen;

/* ===== FORMAT ===== */
function fmt(ms){
let m=Math.floor(ms/60000);
let s=Math.floor((ms%60000)/1000);
let c=Math.floor((ms%1000)/10);
return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}.${String(c).padStart(2,"0")}`;
}

/* ===== MAIN LOOP ===== */
function tick(t){
if(running){
if(!start) start=t-elapsed;
elapsed=t-start;
}

let list=wsMode?wsSpeech:speeches;
let dur=list[i].d*1000;

/* ✅ TIMER vs STOPWATCH LOGIC */
let rem = dur - elapsed;
let show = (mode==="timer") ? rem : elapsed;

if(rem < 0 && mode==="timer") rem = 0;

main.style.strokeDashoffset = mainLen - Math.min(elapsed/dur,1)*mainLen;

speech.textContent=list[i].n;
time.textContent=fmt(show);

/* prep (DISABLED in WSD mode) */
if(!wsMode && prepRunning){
if(!prepStart) prepStart=t-prepElapsed;
prepElapsed=t-prepStart;

if(prepElapsed>=prepDuration){
prepElapsed=prepDuration;
prepRunning=false;
}

prep.style.strokeDashoffset=prepLen-(prepElapsed/prepDuration)*prepLen;
prepTime.textContent=fmt(prepDuration-prepElapsed);
}

requestAnimationFrame(tick);
}

/* ===== CONTROLS ===== */
mainRing.onclick = () => {
running = !running;

if (running) {
start = performance.now() - elapsed;

/* glow only if enabled */
if (glowEnabled) {
mainRing.classList.remove("glow-start");
void mainRing.offsetWidth;
mainRing.classList.add("glow-start");
}
}
};
prepRing.onclick=()=>{prepRunning=!prepRunning;if(prepRunning)prepStart=performance.now()-prepElapsed;}

/* double tap reset */
mainRing.ondblclick=()=>{elapsed=0;running=false;}
prepRing.ondblclick=()=>{prepElapsed=0;prepRunning=false;}

/* swipe */
let sx=0;
document.addEventListener("touchstart",e=>sx=e.touches[0].clientX);
document.addEventListener("touchend",e=>{
let dx=e.changedTouches[0].clientX-sx;
if(Math.abs(dx)>50)dx<0?next():prev();
});

/* keyboard */
document.addEventListener("keydown",e=>{
if(e.key===" "){e.preventDefault();running=!running;if(running)start=performance.now()-elapsed;}
if(e.key==="ArrowRight")next();
if(e.key==="ArrowLeft")prev();
if(e.key==="r"){elapsed=0;running=false;}
if(e.key==="p")prepRunning=!prepRunning;
});

/* nav */
function next(){i=Math.min(wsMode?wsSpeech.length-1:speeches.length-1,i+1);reset();}
function prev(){i=Math.max(0,i-1);reset();}
function reset(){elapsed=0;running=false;}

/* switches */
document.getElementById("formatSwitch").onchange=e=>{
wsMode=e.target.checked;i=0;reset();
};

document.getElementById("layoutSwitch").onchange=e=>{
document.body.className=e.target.checked?"dark landscape":"dark portrait";
};
  
document.getElementById("glowSwitch").onchange = e => {
glowEnabled = e.target.checked;
};
  
/* ✅ NEW MODE SWITCH */
document.getElementById("modeSwitch").onchange=e=>{
mode = e.target.checked ? "stopwatch" : "timer";
};

/* settings */
const panel=document.getElementById("panel");
const overlay=document.getElementById("overlay");

document.getElementById("settingsBtn").onclick=()=>{
panel.classList.add("open");
overlay.classList.add("show");
};

function close(){
panel.classList.remove("open");
overlay.classList.remove("show");
}
document.getElementById("close").onclick=close;
overlay.onclick=close;

/* themes */
document.querySelectorAll("[data-theme]").forEach(b=>{
b.onclick=()=>{
document.body.className=b.dataset.theme;
document.body.classList.add("portrait");
};
});

requestAnimationFrame(tick);

</script>

</body>
</html>

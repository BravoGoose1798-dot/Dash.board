<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LD Debate Timer</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;700&family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f1a;
  --fg:#e8f0ff;
  --accent:#7cf7ff;
  --ring:#2a3350;
  --card:rgba(255,255,255,0.06);
  --glow:none;
}

*{
  box-sizing:border-box;
  font-family:"JetBrains Mono", monospace;
}

body{
  margin:0;
  height:100vh;
  overflow:hidden;
  background:var(--bg);
  color:var(--fg);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* THEMES */
body.dark{--glow:0 0 12px var(--accent);}
body.light{--bg:#f5f7ff;--fg:#111;--accent:#ff4d4d;}
body.min-dark{--bg:#111;--fg:#ddd;--accent:#aaa;}
body.min-light{--bg:#fafafa;--fg:#111;--accent:#444;}
body.aesthetic{--bg:linear-gradient(135deg,#1a002b,#002b36);--accent:#ff7bf7;font-family:"Rajdhani";}
body.hacker{--bg:#000;--fg:#00ff66;--accent:#00ff66;font-family:"Share Tech Mono";}
body.scifi{--bg:#050816;--accent:#4df;font-family:"Orbitron";}
body.synthwave{--bg:#0a0014;--accent:#ff3df2;font-family:"Orbitron";}

/* LAYOUT */
.wrapper{
  display:flex;
  flex-direction:row;
  align-items:center;
  justify-content:center;
  gap:60px;
  width:100%;
  height:100%;
  padding:10px;
}

/* ✅ FIXED: REAL VISUAL TOGGLE */
body.portrait{
  flex-direction:column;
}

body.portrait .wrapper{
  flex-direction:column;
  gap:28px;
}

body.portrait .ring{
  width:300px;
  height:300px;
}

body.portrait .prep-ring{
  width:220px;
  height:220px;
}

/* RINGS */
.ring{
  width:280px;
  height:280px;
  position:relative;
  cursor:pointer;
}

.prep-ring{
  width:200px;
  height:200px;
  position:relative;
  cursor:pointer;
}

svg{transform:rotate(-90deg);}
circle{fill:none;stroke-width:10;stroke-linecap:round;}
.bg-ring{stroke:var(--ring);}

.progress,.prep-progress{
  stroke:var(--accent);
  filter:drop-shadow(var(--glow));
}

/* TEXT */
.time,.prep-time{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;

  width:100%;
  height:100%;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  line-height:1;
}

.time{font-size:2.6rem;}
.prep-time{font-size:1.3rem;}

.small{
  font-size:1rem;
  opacity:.85;
  text-align:center;
}

/* UI */
.settings-btn{
  position:absolute;
  top:18px;
  right:18px;
  background:var(--card);
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  z-index:20;
}

.panel{
  position:absolute;
  top:0;
  right:-320px;
  width:300px;
  height:100%;
  background:var(--card);
  backdrop-filter:blur(10px);
  padding:20px;
  transition:.3s;
  z-index:9999;
}
.panel.open{right:0;}

.overlay{
  position:fixed;
  inset:0;
  display:none;
}
.overlay.show{display:block;}

/* BUTTONS */
.ctrl-btn{
  margin:5px;
  padding:10px 14px;
  border-radius:10px;
  border:1px solid var(--accent);
  background:rgba(255,255,255,0.06);
  color:var(--fg);
  cursor:pointer;
  font-size:14px;
}

.main-controls,
.prep-controls{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}
</style>
</head>

<body class="dark portrait">

<div class="settings-btn" onclick="togglePanel()">⚙</div>
<div class="overlay" id="overlay" onclick="closePanel()"></div>

<div class="panel" id="panel">
  <button onclick="closePanel()">✕</button>

  <p>Mode</p>
  <button class="ctrl-btn" onclick="toggleMode()">Timer/Stopwatch</button>
  <button class="ctrl-btn" onclick="togglePortrait()">Toggle Layout</button>

  <p>Themes</p>
  <button class="ctrl-btn" onclick="setTheme('dark')">Dark</button>
  <button class="ctrl-btn" onclick="setTheme('light')">Light</button>
  <button class="ctrl-btn" onclick="setTheme('min-dark')">Min Dark</button>
  <button class="ctrl-btn" onclick="setTheme('min-light')">Min Light</button>
  <button class="ctrl-btn" onclick="setTheme('aesthetic')">Aesthetic</button>
  <button class="ctrl-btn" onclick="setTheme('hacker')">Hacker</button>
  <button class="ctrl-btn" onclick="setTheme('scifi')">Sci-Fi</button>
  <button class="ctrl-btn" onclick="setTheme('synthwave')">Synthwave</button>
</div>

<div class="wrapper">

  <div>
    <div class="small">PREP</div>
    <div class="prep-ring" onclick="handlePrepTap()">
      <svg width="200" height="200">
        <circle class="bg-ring" cx="100" cy="100" r="70"></circle>
        <circle class="prep-progress" cx="100" cy="100" r="70"></circle>
      </svg>
      <div class="prep-time" id="prepTime">04:00.00</div>
    </div>
  </div>

  <div>
    <div class="small" id="speech">Ready</div>

    <div class="ring" onclick="handleMainTap()">
      <svg width="280" height="280">
        <circle class="bg-ring" cx="140" cy="140" r="110"></circle>
        <circle class="progress" cx="140" cy="140" r="110"></circle>
      </svg>
      <div class="time" id="time">00:00.00</div>
    </div>

    <div class="main-controls">
      <button class="ctrl-btn" onclick="prevSpeech()">◀</button>
      <button class="ctrl-btn" onclick="nextSpeech()">▶</button>
      <button class="ctrl-btn" onclick="resetMain()">Reset</button>
    </div>
  </div>

</div>

<script>

/* EVERYTHING ELSE UNCHANGED ABOVE THIS LINE */

/* FIXED TOGGLE LAYOUT */
function togglePortrait(){
  const isPortrait = document.body.classList.toggle("portrait");

  const btn = document.querySelector(".settings-btn");
  if(btn){
    btn.textContent = isPortrait ? "⚙ 📱" : "⚙ 💻";
  }
}

/* ---------------- TIMER CORE ---------------- */

const speeches=[
 {name:"AC",duration:360},
 {name:"CX",duration:180},
 {name:"NC",duration:420},
 {name:"CX",duration:180},
 {name:"1AR",duration:240},
 {name:"NR",duration:360},
 {name:"2AR",duration:180}
];

let i=0;
let running=false;
let start=0;
let elapsed=0;
let mode="timer";

let prepRunning=false;
let prepDuration=240000;
let prepStart=0;
let prepElapsed=0;

/* TRIPLE TAP */
let mainTaps = [];
let prepTaps = [];
const TRIPLE_WINDOW = 600;

function registerTap(arr, callback){
  const now = performance.now();
  arr.push(now);
  arr = arr.filter(t => now - t < TRIPLE_WINDOW);

  if(arr.length >= 3){
    arr.length = 0;
    callback();
  }

  return arr;
}

function handleMainTap(){
  mainTaps = registerTap(mainTaps, resetMain);
  toggleMain();
}

function handlePrepTap(){
  prepTaps = registerTap(prepTaps, resetPrep);
  togglePrep();
}

function resetMain(){
 elapsed=0;
 start=0;
 running=false;
}

function resetPrep(){
 prepElapsed=0;
 prepStart=0;
 prepRunning=false;
 document.getElementById("prepTime").textContent="04:00.00";
}

/* CORE */
const prepCircle=document.querySelector(".prep-progress");
const mainCircle=document.querySelector(".progress");

const prepLen=2*Math.PI*70;
const mainLen=2*Math.PI*110;

prepCircle.style.strokeDasharray=prepLen;
mainCircle.style.strokeDasharray=mainLen;

function format(ms){
 let m=Math.floor(ms/60000);
 let s=Math.floor((ms%60000)/1000);
 let cs=Math.floor((ms%1000)/10);
 return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}.${String(cs).padStart(2,"0")}`;
}

function tick(t){

 if(!start) start=t;
 if(running) elapsed=t-start;

 let dur=speeches[i].duration*1000;
 let display=mode==="timer"?dur-elapsed:elapsed;

 mainCircle.style.strokeDashoffset=mainLen-(elapsed/dur)*mainLen;
 document.getElementById("time").textContent=format(display);
 document.getElementById("speech").textContent=speeches[i].name;

 if(prepRunning){
  if(!prepStart) prepStart=t;
  prepElapsed=t-prepStart;

  prepCircle.style.strokeDashoffset=
    prepLen-(prepElapsed/prepDuration)*prepLen;

  document.getElementById("prepTime").textContent=
    format(prepDuration-prepElapsed);
 }

 requestAnimationFrame(tick);
}

/* CONTROLS */
function toggleMain(){
 running=!running;
 if(running) start=performance.now()-elapsed;
}

function togglePrep(){
 prepRunning=!prepRunning;
 if(prepRunning) prepStart=performance.now()-prepElapsed;
}

function nextSpeech(){i=Math.min(speeches.length-1,i+1);elapsed=0;start=0;}
function prevSpeech(){i=Math.max(0,i-1);elapsed=0;start=0;}

function toggleMode(){
 mode=mode==="timer"?"stopwatch":"timer";
}

/* THEME */
const themeClasses=[
 "dark","light","min-dark","min-light",
 "aesthetic","hacker","scifi","synthwave"
];

function setTheme(t){
 document.body.classList.remove(...themeClasses);
 document.body.classList.add(t);
}

/* KEYS */
document.addEventListener("keydown",(e)=>{
 if(e.repeat) return;

 if(e.code==="Space"){
  e.preventDefault();
  toggleMain();
 }

 if(e.code==="KeyP") togglePrep();
 if(e.code==="KeyR") resetMain();
 if(e.code==="ArrowRight") nextSpeech();
 if(e.code==="ArrowLeft") prevSpeech();
});

/* PANEL */
function togglePanel(){
 document.getElementById("panel").classList.toggle("open");
 document.getElementById("overlay").classList.toggle("show");
}

function closePanel(){
 document.getElementById("panel").classList.remove("open");
 document.getElementById("overlay").classList.remove("show");
}

requestAnimationFrame(tick);

</script>

</body>
</html>
